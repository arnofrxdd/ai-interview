version: '3.8'

services:
  livekit-server:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    environment:
      - LIVEKIT_IP=${PUBLIC_IP:-127.0.0.1} # Change this in .env or via shell
    volumes:
      - ./livekit-server/livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: always

  livekit-agent:
    build:
      context: ./livekit-agent-backend
      dockerfile: Dockerfile
    environment:
      - LIVEKIT_URL=http://livekit-server:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-v32charslong_secret_key_for_livekit}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./livekit-agent-backend/logs:/app/logs
    depends_on:
      - livekit-server
    restart: always

  ai-interview-app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_LIVEKIT_URL=wss://arnavcloud.co.in
    ports:
      - "7001:3000"
    environment:
      - NODE_ENV=production
      - LIVEKIT_URL=http://livekit-server:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-v32charslongSecretKeyForLivekit123}
    env_file:
      - .env
    depends_on:
      - livekit-server
    restart: always
